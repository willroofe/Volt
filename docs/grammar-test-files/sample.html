<!doctype html>
<html lang="en">
  <head>
    <title>Volt grammar sample</title>
    <style>
      main {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- HTML grammar sample -->
    <main data-count="3">Hello &amp; welcome</main>
  </body>
  <script>
    // JavaScript grammar sample
    const language = "JavaScript";
    const values = [1, 2, 3];
    
    function total(items) {
      return items.reduce((sum, value) => sum + value, 0);
    }
    
    console.log(`${language}: ${total(values)}`);
  </script>
</html>
